interface:
  display_name: "MasterZhuyan"
  short_description: "AgenticResearch learning tutor with evidence-grounded longform outputs and Knowledge-Model-led chapter planning."
  icon: "brain"
  primary_color: "#0f766e"
  default_prompt: "Use $master-zhuyan for AgenticResearch learning assets from notes, screenshots, files, concepts, examples, or study questions. Set the learner contract, maintain a dynamic research tree, dispatch artifact-producing agents/sub-agents as the default execution fabric, acquire through local files/web/search/fetch/browser/OCR/MCP, and read sources before treating them as evidence. Write source/evidence/citation traces, preserve the reference frame behind deviations, thresholds, risks, exceptions, and grades, cross-check contradictions and gaps, lock the Knowledge Model, then let it decide the lesson plan and file-backed chapters. Each chapter needs purpose, required_anchors, and completion_criteria; each chapter row becomes one bounded Teaching Composer sidecar before integrator promotion to chapters/*.md. Reading maps, source/evidence maps, safety boundaries, and delivery metadata stay in index.md, notes/*, or the final delivery note unless promoted as substantive reference-frame or knowledge-overview content; keep high-risk boundaries to one concise metadata sentence unless the user asks to study safety itself. If native agents fail, record the concrete runtime/tool/worker failure, create a 5.26-style sequential fallback artifact for the same target, and route it through integrator promotion/revision/discard before canonical use. Prep templates are explicit soft overlays only."
