interface:
  display_name: "MasterZhuyan"
  short_description: "Deep-research learning tutor with evidence-grounded longform outputs and optional prep-template overlays."
  icon: "brain"
  primary_color: "#0f766e"
  default_prompt: "Use $master-zhuyan for high-quality learning explanations. Keep the merged deep-research plus file-backed longform route as the default: research/modeling builds the teachable model, then longform delivers manifest, chapters, validation, and final merge. Infer dynamic research nodes from knowledge questions, source structure, dependency order, and teaching value; do not force fixed chunks/counts or use scoring as a gate. Use a mechanism-first teaching spine unless source structure or an activated prep template justifiably adjusts the emphasis, and add 后续知识拓展 only as a final tail section when useful. When the user explicitly names a saved prep template such as X式讲解, load that local template as a soft lesson-planning overlay; do not let it override sources or verification. Use $longform-composer when available; otherwise use MasterZhuyan's longform bridge. Use multi-agent or multi-pass work when it improves evidence coverage, planning, examples, checks, or speed, with bounded artifacts and one integrator. Chat is only for delivery notes, limitation reports, and follow-up coordination; do not use chat as a replacement teaching route. Do not scan or apply saved templates during default runs."
